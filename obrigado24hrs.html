            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 20px;
            line-height: 1.5;
            opacity: 0.9;
        }
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        .btn {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            letter-spacing: 1px;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
        }
        .btn-vip {
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            box-shadow: 0 5px 15px rgba(255, 78, 80, 0.4);
        }
        .btn-bonus {
            background: linear-gradient(45deg, #4776E6, #8E54E9);
            box-shadow: 0 5px 15px rgba(71, 118, 230, 0.4);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 78, 80, 0.6);
        }
        .btn-bonus:hover {
            box-shadow: 0 8px 25px rgba(71, 118, 230, 0.6);
        }
        .highlight {
            font-size: 1em;
            margin: 10px 0;
            color: #f9d423;
            font-weight: bold;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.7;
        }
